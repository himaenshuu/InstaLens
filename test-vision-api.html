<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Vision API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🔍 Google Vision API Tester</h1>
    <p>This will test if your Google Vision API key is working correctly.</p>

    <label for="apiKey">API Key:</label>
    <input type="text" id="apiKey" placeholder="Enter your Google Vision API key" value="AIzaSyDuIhv5I8iMoRGhAs7hLCOaSWSWjUy1WQ4">

    <label for="imageUrl">Image URL:</label>
    <input type="text" id="imageUrl" placeholder="Enter image URL to test" value="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Cat03.jpg/1200px-Cat03.jpg">

    <button onclick="testVisionAPI()">Test API</button>

    <div id="result"></div>

    <script>
        async function testVisionAPI() {
            const apiKey = document.getElementById('apiKey').value;
            const imageUrl = document.getElementById('imageUrl').value;
            const resultDiv = document.getElementById('result');

            if (!apiKey) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Please enter an API key';
                return;
            }

            if (!imageUrl) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Please enter an image URL';
                return;
            }

            resultDiv.className = 'result';
            resultDiv.textContent = '⏳ Testing API... Please wait...';

            try {
                const endpoint = `https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`;

                const requestBody = {
                    requests: [{
                        image: {
                            source: {
                                imageUri: imageUrl
                            }
                        },
                        features: [
                            { type: 'LABEL_DETECTION', maxResults: 5 }
                        ]
                    }]
                };

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (!response.ok) {
                    resultDiv.className = 'result error';
                    
                    if (response.status === 403) {
                        resultDiv.textContent = `❌ ERROR 403 - FORBIDDEN\n\nYour API key is being rejected. Possible causes:\n\n1. Vision API is not enabled in Google Cloud Console\n2. Billing is not enabled (Vision API requires billing)\n3. API key has restrictions blocking this request\n4. API key is invalid or expired\n\nFull Response:\n${JSON.stringify(data, null, 2)}`;
                    } else if (response.status === 400) {
                        resultDiv.textContent = `❌ ERROR 400 - BAD REQUEST\n\nThe API request format is incorrect:\n\n${JSON.stringify(data, null, 2)}`;
                    } else {
                        resultDiv.textContent = `❌ ERROR ${response.status}\n\n${JSON.stringify(data, null, 2)}`;
                    }
                    return;
                }

                // Check if response has error
                if (data.responses && data.responses[0] && data.responses[0].error) {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `❌ API Error:\n${JSON.stringify(data.responses[0].error, null, 2)}`;
                    return;
                }

                // Success!
                resultDiv.className = 'result success';
                const labels = data.responses[0].labelAnnotations || [];
                
                resultDiv.textContent = `✅ SUCCESS! Vision API is working!\n\nDetected Labels:\n${labels.map(l => `- ${l.description} (${(l.score * 100).toFixed(1)}% confidence)`).join('\n')}\n\nFull Response:\n${JSON.stringify(data, null, 2)}`;

            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ Network Error:\n${error.message}\n\nThis might be a CORS issue or network problem.`;
            }
        }
    </script>
</body>
</html>
